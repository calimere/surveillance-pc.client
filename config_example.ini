[settings]
avoid_scan = False
avoid_windows_scan = False
discord_send = False
tempo_scan = 600 
tempo_sync = 300
bidirectional_sync_interval = 600
mqtt_enabled = 0

[paths]
db_path = watch.db

[url]
discord_webhook_url = ""

[mqtt]
host XXXXXXXXXXXXXXXXXX
port = XXXXXXXXXXXXXXXXXX
user = XXXXXXXXXXXXXXXXXX
password = XXXXXXXXXXXXXXXXXX

[api]
url = https://api.surveillance-pc.example.com

[sync]
# Résolution de conflit : "server_wins" ou "client_wins" 
conflict_resolution = server_wins
# Activer le push via MQTT pour les changements temps réel
enable_mqtt_push = true

[win-deploy]
service_name = surveillance-pc-service
service_display_name = Surveillance PC Service
service_description = This is a Python service running run.py as a Windows service.